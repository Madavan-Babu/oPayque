name: oPayque CI/CD Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    # 1. Define the Database Service (The Fix)
    # This spins up a real PostgreSQL instance inside the GitHub Runner.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: opayque_test
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify with Maven
        run: mvn --batch-mode --update-snapshots verify
        env:
          # 2. Force Application to use the Service Container
          # These overrides take precedence over application.yml defaults.
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/opayque_test
          SPRING_DATASOURCE_USERNAME: ci_user
          SPRING_DATASOURCE_PASSWORD: ci_password
          # Keep your existing secret for production builds if needed later
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}