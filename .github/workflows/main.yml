name: oPayque CI/CD Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    services:
      # --- PERSISTENCE LAYER: POSTGRESQL ---
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: opayque_test
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # --- CACHE LAYER: REDIS ---
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify with Maven
        # Note: 'verify' lifecycle includes unit, integration, and archunit tests
        run: mvn --batch-mode --update-snapshots verify
        env:
          # --- REMOVED DATABASE OVERRIDES HERE ---
          # We deleted SPRING_DATASOURCE_* and SPRING_JPA_* vars.
          # This allows 'application-test.yaml' (H2) to work for unit tests,
          # while 'LedgerStressTest' (Postgres) sets its own config dynamically.

          # --- REDIS CONFIGURATION (CI OVERRIDES) ---
          # Injects localhost mapping for the Redis service container
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

          # --- SECRETS ---
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}