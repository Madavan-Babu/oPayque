name: oPayque CI/CD Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    services:
      # --- PERSISTENCE LAYER: POSTGRESQL ---
      # --- REMOVED POSTGRES SERVICE ---
      # Reason: Optimization.
      # 1. Unit Tests use H2 (application-test.yaml).
      # 2. Integration Tests use Testcontainers (Self-managed).
      # This saves ~300MB RAM to prevent OOM Kills during the Stress Test.


      # --- CACHE LAYER: REDIS ---
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify with Maven
        # Note: 'verify' lifecycle includes unit, integration, and archunit tests
        run: mvn --batch-mode --update-snapshots verify
        env:
          # --- REMOVED DATABASE OVERRIDES HERE ---
          # We deleted SPRING_DATASOURCE_* and SPRING_JPA_* vars.
          # This allows 'application-test.yaml' (H2) to work for unit tests,
          # while 'LedgerStressTest' (Postgres) sets its own config dynamically.

          # --- 1. GLOBAL PROFILE FORCE ---
          # This forces ALL tests to use 'application-test.yaml' (H2) by default.
          # It prevents them from falling back to 'dev' (Postgres) and crashing on empty DBs.
          SPRING_PROFILES_ACTIVE: test

          # --- REDIS CONFIGURATION (CI OVERRIDES) ---
          # Injects localhost mapping for the Redis service container
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

          # --- SECRETS ---
          # FIX: Added this back to guarantee Spring Security startup
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'v3ry-s3cr3t-b4nk-gr4d3-k3y-th4t-sh0uld-b3-v3ry-l0ng' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}