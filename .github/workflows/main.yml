name: oPayque CI/CD Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    services:
      # --- PERSISTENCE LAYER: POSTGRESQL ---
      # --- REMOVED POSTGRES SERVICE ---
      # Reason: Optimization.
      # 1. Unit Tests use H2 (application-test.yaml).
      # 2. Integration Tests use Testcontainers (Self-managed).
      # This saves ~300MB RAM to prevent OOM Kills during the Stress Test.


      # --- CACHE LAYER: REDIS ---
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify with Maven
        # Note: 'verify' lifecycle includes unit, integration, and archunit tests
        run: mvn --batch-mode --update-snapshots verify
        env:
          # --- REMOVED DATABASE OVERRIDES HERE ---
          # We deleted SPRING_DATASOURCE_* and SPRING_JPA_* vars.
          # This allows 'application-test.yaml' (H2) to work for unit tests,
          # while 'LedgerStressTest' (Postgres) sets its own config dynamically.

          # --- 1. GLOBAL PROFILE FORCE ---
          # This forces ALL tests to use 'application-test.yaml' (H2) by default.
          # It prevents them from falling back to 'dev' (Postgres) and crashing on empty DBs.
          SPRING_PROFILES_ACTIVE: test

          # --- REDIS CONFIGURATION (CI OVERRIDES) ---
          # Injects localhost mapping for the Redis service container
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

          # --- SECRETS ---
          # FIX: Added this back to guarantee Spring Security startup
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'v3ry-s3cr3t-b4nk-gr4d3-k3y-th4t-sh0uld-b3-v3ry-l0ng' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

  # --- VERSION MANAGEMENT JOB ---
  manage-version:
    needs: build-and-verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Increment Version Number
        id: bump
        run: |
          CURRENT_VER=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          MAJOR=$(echo $CURRENT_VER | cut -d. -f1)
          MINOR=$(echo $CURRENT_VER | cut -d. -f2)
          PATCH=$(echo $CURRENT_VER | cut -d. -f3)

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            NEW_MAJOR=$((MAJOR + 1))
            NEW_VER="${NEW_MAJOR}.0.0"
            echo "IS_MAIN=true" >> $GITHUB_ENV
          else
            NEW_MINOR=$((MINOR + 1))
            NEW_VER="${MAJOR}.${NEW_MINOR}.${PATCH}-SNAPSHOT"
            echo "IS_MAIN=false" >> $GITHUB_ENV
          fi

          echo "NEW_VERSION=$NEW_VER" >> $GITHUB_ENV
          mvn versions:set -DnewVersion=$NEW_VER -DgenerateBackupPoms=false

      - name: Commit, Tag, and Push
        run: |
          git config --global user.name "oPayque-Bot"
          git config --global user.email "actions@github.com"
          git add pom.xml
          
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]" || echo "No changes"
          
          if [[ "${{ env.IS_MAIN }}" == "true" ]]; then
            git tag "v${{ env.NEW_VERSION }}"
            git push origin "v${{ env.NEW_VERSION }}"
          fi
          
          git push