name: oPayque CI/CD Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  # ==========================================
  # JOB 1: BUILD & VERIFY (Runs on every push)
  # ==========================================
  build-and-verify:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify with Maven
        run: mvn --batch-mode --update-snapshots verify
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'v3ry-s3cr3t-b4nk-gr4d3-k3y-th4t-sh0uld-b3-v3ry-l0ng' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

  # ==========================================
  # JOB 2: PUBLISH TO AWS ECR (Runs ONLY on Main)
  # ==========================================
  publish-to-ecr:
    needs: build-and-verify
    runs-on: ubuntu-latest
    # STRICT GATE: Only run if we are merging/pushing to the 'main' branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: opayque-api
          # We tag the image with 'latest' AND the specific Git commit hash for traceability
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 1. Build the Docker image using your highly optimized Dockerfile
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          
          # 2. Push to your private AWS vault
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  # ==========================================
  # JOB 3: MANAGE VERSION (Runs last)
  # ==========================================
  manage-version:
    needs: [build-and-verify, publish-to-ecr]
    runs-on: ubuntu-latest
    # COMPLEX GATE: Run if build succeeded, AND ECR was either successful (main) or skipped (feature)
    if: |
      always() && 
      github.event_name == 'push' &&
      needs.build-and-verify.result == 'success' && 
      (needs.publish-to-ecr.result == 'success' || needs.publish-to-ecr.result == 'skipped')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Increment Version Number
        id: bump
        run: |
          CURRENT_VER=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          MAJOR=$(echo $CURRENT_VER | cut -d. -f1)
          MINOR=$(echo $CURRENT_VER | cut -d. -f2)
          PATCH=$(echo $CURRENT_VER | cut -d. -f3)

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            NEW_MAJOR=$((MAJOR + 1))
            NEW_VER="${NEW_MAJOR}.0.0"
            echo "IS_MAIN=true" >> $GITHUB_ENV
          else
            NEW_MINOR=$((MINOR + 1))
            NEW_VER="${MAJOR}.${NEW_MINOR}.${PATCH}-SNAPSHOT"
            echo "IS_MAIN=false" >> $GITHUB_ENV
          fi

          echo "NEW_VERSION=$NEW_VER" >> $GITHUB_ENV
          mvn versions:set -DnewVersion=$NEW_VER -DgenerateBackupPoms=false

      - name: Commit, Tag, and Push
        run: |
          git config --global user.name "oPayque-Bot"
          git config --global user.email "actions@github.com"
          git add pom.xml
          
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]" || echo "No changes"
          
          if [[ "${{ env.IS_MAIN }}" == "true" ]]; then
            git tag "v${{ env.NEW_VERSION }}"
            git push origin "v${{ env.NEW_VERSION }}"
          fi
          
          git push