spring:
  application:
    name: oPayque-API
  # --- Cache Layer Redis ---
  data:
    redis:
      host: localhost
      port: 6379
  # --- Database Layer Postgres ---
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:opayque_db}
    username: ${DB_USER:madavan} # Who might this be?
    password: ${DB_PASSWORD} # This uses the environment variable on my machine
  jpa:
    hibernate:
      ddl-auto: validate # let Liquibase handle the schema
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml