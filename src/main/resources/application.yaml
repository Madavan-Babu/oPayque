spring:
  profiles:
    default: dev # Default for local coding
  application:
    name: oPayque-API

  # =========================================================================
  #                        BANK-GRADE CORE CONFIGURATION
  # =========================================================================
  # These settings define the architectural behavior of the ledger.
  # They apply to ALL environments (Dev, Prod) unless explicitly overridden
  # by the Test profile.

  jpa:
    # 1. ARCHITECTURAL SAFETY (NON-NEGOTIABLE)
    # Forces Hibernate to generate "SELECT ... FOR UPDATE" SQL correctly via PESSIMISTIC_WRITE.
    # Without this, locking might silently fail or revert to standard SELECTs in some environments.
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

        # 2. DRIVER COMPATIBILITY
        # Fixes PostgreSQL 15+ metadata fetching issues and "CLOB" warnings.
        jdbc:
          use_get_generated_keys: true
        temp:
          use_jdbc_metadata_defaults: false

  datasource:
    hikari:
      # 3. CAPACITY PLANNING & THROUGHPUT
      # Defines how many concurrent transactions the application can handle.
      #
      # maximum-pool-size:
      #   - Default: 30 (Good for ~300-500 TPS per instance)
      #   - Scalable via Env Var: DB_POOL_SIZE
      #
      # minimum-idle:
      #   - Keeps 10 connections warm to prevent "cold start" latency for new requests.
      maximum-pool-size: ${DB_POOL_SIZE:30}
      minimum-idle: ${DB_MIN_IDLE:10}
      connection-timeout: 30000 # 30 seconds
      max-lifetime: 1800000 # 30 minutes (Standard for Postgres resource reclamation)

# =========================================================================
#                            CUSTOM PROPERTIES
# =========================================================================
application:
  integration:
    exchange-rate:
      base-url: https://v6.exchangerate-api.com/v6
      api-key: ${EXCHANGE_RATE_API_KEY}
  security:
    jwt:
      # Use a 64-character hex string in production! (REMEMBER TO CHANGE THIS!)
      secret-key: ${JWT_SECRET_KEY}
      expiration: 900000 # 15 mins
      refresh-token:
        expiration: 604800000 # 7 Days (milliseconds)
    admin:
      email: ${ADMIN_EMAIL}
      password: ${ADMIN_PASSWORD}

# =========================================================================
#                        EPIC 4: ENCRYPTION VAULT
# =========================================================================
opayque:
  security:
    # ROTATION STRATEGY:
    # We support multiple active keys.
    # - 'active-version': The key used for NEW writes (Encryption).
    # - 'keys': A map of ALL valid keys used for reads (Decryption).
    #
    # To Rotate:
    # 1. Add "v2" to 'keys'.
    # 2. Set 'active-version' to 2.
    # 3. Restart. (Old data decrypts with v1, new writes use v2).
    active-version: 1
    keys:
      1: ${ENCRYPTION_KEY_V1}

    # HMAC Key (Blind Indexing) - Stays single for now (Harder to rotate)
    hashing-key: ${HASHING_KEY}

  # Story 4.2 Card Factory Configuration
  card:
    bin-prefix: "171103"
    expiry-years: 3

# =========================================================================
#                        EPIC 5: OBSERVABILITY & METRICS
# =========================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always # Shows detailed DB and custom health statuses
  metrics:
    tags:
      application: oPayque-API # Tags all exported metrics with your app name