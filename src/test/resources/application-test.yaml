spring:
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
  liquibase:
    enabled: true # Let the Robot test if your changelogs are valid!
    change-log: classpath:db/changelog/db.changelog-master.xml


# Custom properties
application:
  security:
    jwt:
      # Use a 64-character hex string in production! (REMEMBER TO CHANGE THIS!)
      secret-key: ${JWT_SECRET_KEY:v3ry-s3cr3t-b4nk-gr4d3-k3y-th4t-sh0uld-b3-v3ry-l0ng}
      expiration: 900000 # 15 mins
      refresh-token:
        expiration: 604800000 # 7 Days (milliseconds)