spring:
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    driver-class-name: org.h2.Driver
  jpa:
    # 1. Force H2 Platform (Overrides Parent Postgres)
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate # Validates Liquibase schema against Entities
    properties:
      hibernate:
        # 2. Force H2 Dialect (Overrides Parent Postgres Dialect)
        dialect: org.hibernate.dialect.H2Dialect
        # 3. REVERT Driver Compatibility for H2
        # The parent disables this for Postgres, but we must re-enable it for H2
        temp:
          use_jdbc_metadata_defaults: true
        jdbc:
          use_get_generated_keys: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

# Custom properties
application:
  integration:
    exchange-rate:
      # We will override this dynamically in the test class to point to WireMock's random port
      base-url: http://localhost:8080/v6
      api-key: test-dummy-key
  security:
    jwt:
      # Use a 64-character hex string in production! (REMEMBER TO CHANGE THIS!)
      secret-key: v3ry-s3cr3t-b4nk-gr4d3-k3y-th4t-sh0uld-b3-v3ry-l0ng
      expiration: 900000 # 15 mins
      refresh-token:
        expiration: 604800000 # 7 Days (milliseconds)
    # FIXED: Added the missing admin credentials for tests
    admin:
      email: admin@opayque.com
      password: Admin@1234


# =========================================================================
#                        TEST SECURITY CONFIGURATION
# =========================================================================
opayque:
  security:
    active-version: 1
    # Standard YAML Map syntax - Spring Boot binds this automatically to Map<Integer, String>
    keys:
      1: TestKeyV1_For_Integration_Testing_12345
    hashing-key: TestHashingKey_For_Blind_Index_12345
  card:
    bin-prefix: "171103"
    expiry-years: 3